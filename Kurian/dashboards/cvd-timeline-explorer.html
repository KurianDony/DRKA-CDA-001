<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CVD Tenancy Timeline Explorer</title>
<style>
  :root{
    --bg:#0f1117; --panel:#171a23; --panel2:#1e222d; --line:#2a2f3d; --line2:#353b4d;
    --txt:#e7e9ee; --mut:#9aa3b2; --mut2:#6b7385; --acc:#5b8def; --gap:#c7413b;
    --in:#3fb37f; --out:#e0863c; --maint:#8a7dd6; --ongoing:#2f8f6a; --pre:#4a6fa5;
    --chip:#232838;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  header{padding:16px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:30}
  h1{margin:0;font-size:17px;font-weight:650;letter-spacing:.2px}
  .sub{color:var(--mut);font-size:12.5px;margin-top:3px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;padding:12px 20px 0}
  .tab{padding:8px 13px;border:1px solid var(--line);border-bottom:none;border-radius:8px 8px 0 0;
    background:var(--panel);color:var(--mut);cursor:pointer;font-size:12.8px;font-weight:550;white-space:nowrap}
  .tab .n{color:var(--mut2);font-weight:500;font-size:11px;margin-left:6px}
  .tab.active{background:var(--panel2);color:var(--txt);border-color:var(--line2)}
  .wrap{padding:0 20px 60px}
  .board{border:1px solid var(--line2);border-radius:0 10px 10px 10px;background:var(--panel2);padding:14px 6px 18px}
  .hmeta{display:flex;gap:14px;flex-wrap:wrap;color:var(--mut);font-size:12px;padding:2px 12px 12px}
  .hmeta b{color:var(--txt);font-weight:600}
  .axis{position:relative;height:22px;margin:0 10px 2px 190px;border-bottom:1px solid var(--line)}
  .mtick{position:absolute;top:0;height:100%;border-left:1px solid var(--line);padding-left:4px;
    color:var(--mut2);font-size:10.5px;white-space:nowrap}
  .room{margin:0 10px;border-top:1px solid var(--line);padding:9px 0 5px}
  .room:first-of-type{border-top:none}
  .rhead{display:flex;align-items:baseline;gap:9px;margin-bottom:5px}
  .rname{font-weight:650;font-size:13.5px}
  .rcodes{color:var(--mut2);font-size:11px}
  .rnote{color:var(--mut);font-size:11px;font-style:italic;margin:1px 0 5px}
  .lane{position:relative;display:flex;align-items:stretch;margin:3px 0;min-height:26px}
  .lanelbl{width:180px;flex:0 0 180px;padding-right:10px;text-align:right;color:var(--mut);
    font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;align-self:center}
  .track{position:relative;flex:1;background:
     repeating-linear-gradient(90deg,transparent 0,transparent calc(8.333% - 1px),var(--line) calc(8.333% - 1px),var(--line) 8.333%);
     border-radius:4px;min-height:22px}
  .subrow{position:relative;height:24px;margin:2px 0}
  .bar{position:absolute;top:2px;height:20px;border-radius:4px;cursor:pointer;overflow:hidden;
    font-size:11px;line-height:20px;padding:0 7px;color:#0c0e14;font-weight:600;white-space:nowrap;
    border:1px solid rgba(0,0,0,.25);box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .bar:hover{filter:brightness(1.09);outline:2px solid var(--acc);z-index:5}
  .bar.hr::after{content:"⚑";margin-left:6px;opacity:.85}
  .bar.ongoing{border-right:2px dashed rgba(0,0,0,.5)}
  .bar.pre{border-left:2px dashed rgba(0,0,0,.5)}
  .mlane{position:relative;height:16px;margin:1px 0 4px}
  .mseg{position:absolute;top:4px;height:8px;background:var(--maint);border-radius:3px;cursor:pointer;opacity:.8}
  .mseg:hover{opacity:1;outline:1px solid var(--acc)}
  .mdot{position:absolute;top:2px;width:10px;height:10px;background:var(--maint);transform:rotate(45deg);
    cursor:pointer;border:1px solid rgba(0,0,0,.3)}
  .mdot:hover{outline:2px solid var(--acc)}
  .mlbl{width:180px;flex:0 0 180px;text-align:right;padding-right:10px;color:var(--maint);font-size:10.5px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;padding:8px 12px 2px;color:var(--mut);font-size:11.5px}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .hm{margin:10px 12px 0;border-top:1px dashed var(--line);padding-top:8px}
  .hm summary{cursor:pointer;color:var(--mut);font-size:12.5px;font-weight:600}
  .hm table{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}
  .hm th,.hm td{text-align:left;padding:5px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  .hm th{color:var(--mut2);font-weight:600;position:sticky}
  .hm a{color:var(--acc);text-decoration:none}
  /* drawer */
  #drawer{position:fixed;top:0;right:0;width:min(460px,94vw);height:100%;background:var(--panel);
    border-left:1px solid var(--line2);transform:translateX(102%);transition:transform .18s ease;
    z-index:50;overflow-y:auto;box-shadow:-8px 0 24px rgba(0,0,0,.4)}
  #drawer.open{transform:none}
  .dh{position:sticky;top:0;background:var(--panel);padding:15px 18px;border-bottom:1px solid var(--line);z-index:2}
  .dh h3{margin:0;font-size:15px}
  .dh .x{position:absolute;top:12px;right:14px;cursor:pointer;color:var(--mut);font-size:20px;line-height:1}
  .dbody{padding:14px 18px 40px}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:12px 13px;margin-bottom:12px}
  .card h4{margin:0 0 8px;font-size:12px;letter-spacing:.4px;text-transform:uppercase;color:var(--mut)}
  .card h4 .pill{float:right;font-size:10px;padding:2px 7px;border-radius:20px;text-transform:none;letter-spacing:0}
  .kv{display:grid;grid-template-columns:104px 1fr;gap:3px 10px;font-size:12.5px}
  .kv b{color:var(--mut2);font-weight:600}
  .note{margin-top:9px;padding:9px 10px;background:var(--bg);border:1px solid var(--line);border-radius:7px;
    font-size:12px;white-space:pre-wrap;color:var(--txt);max-height:230px;overflow:auto}
  .flag{display:inline-block;margin-top:8px;padding:3px 9px;border-radius:6px;background:#3a2530;color:#ffb4b4;
    font-size:11.5px;border:1px solid #5a2f3c}
  .fee{margin-top:8px;padding:8px 10px;border:1px solid var(--line);border-radius:7px;background:#1b2018;font-size:12px}
  .fee b{color:#bfe3a8}
  .lnk{color:var(--acc);text-decoration:none;font-size:12px;word-break:break-all}
  .pill.pin{background:#173b2b;color:#7fe0ab}.pill.pout{background:#3b2a17;color:#f0b784}
  .empty{color:var(--mut2);font-style:italic;font-size:11.5px;padding:4px 0}
  .hint{color:var(--mut2);font-size:11px;padding:6px 12px 0}
  .tab .hr{color:#f0a64e;font-weight:600;margin-left:6px;font-size:11px}
  .toggle{margin-left:auto;display:inline-flex;align-items:center;gap:7px;cursor:pointer;
    background:var(--chip);border:1px solid var(--line2);border-radius:20px;padding:5px 12px;
    color:var(--mut);font-size:12px;font-weight:550}
  .toggle.on{background:#3a2a12;border-color:#7a5a26;color:#f2c187}
  .toggle .dot{width:9px;height:9px;border-radius:50%;background:var(--mut2)}
  .toggle.on .dot{background:#f0a64e}
  body.hronly .nohr{opacity:.07;pointer-events:none}
  body.hronly .mseg,body.hronly .mdot{opacity:.15}
  /* Kurian box */
  .kbox{border:1px solid #7a5a26;background:linear-gradient(180deg,#2a2113,#211a10);border-radius:11px;
    padding:0 0 13px;margin-bottom:14px;overflow:hidden}
  .khead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#3a2a12;padding:9px 13px;border-bottom:1px solid #6a4d22}
  .ktag{background:#f0a64e;color:#241a08;font-weight:750;font-size:11px;letter-spacing:.6px;padding:3px 9px;border-radius:5px}
  .kcat{color:#f4cd9a;font-weight:650;font-size:13px}
  .keli{padding:11px 14px 2px;font-size:13px;line-height:1.5;color:#f2e6d4}
  .keli b{color:#f0a64e}
  .kfacts{padding:9px 14px 2px;font-size:12.5px;color:#e6dccb}
  .kfacts b{color:#f0a64e;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px}
  .kfacts ul{margin:5px 0 0;padding-left:18px}.kfacts li{margin:3px 0;line-height:1.4}
  .kruling{margin:11px 13px 0;padding:10px 12px;background:#132318;border:1px solid #2c5a3c;border-radius:8px}
  .klab{color:#7fe0ab;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .kruling p{margin:5px 0;font-size:12.3px;line-height:1.45;color:#d6ecdd}
  .krow{padding:6px 14px 0}
</style>
</head>

const MONTHS = [];
for(let y=2025,m=6; MONTHS.length<12; m++){ if(m>11){m=0;y++;} MONTHS.push(new Date(y,m,1)); }
const MN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function pd(s){ return s ? new Date(s) : null; }
function pct(d){ return Math.max(0,Math.min(100, (d-AX_START)/SPAN*100)); }
function esc(s){ return (s==null?"":(""+s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function hue(s){ let h=0; for(const c of (s||"")) h=(h*31+c.charCodeAt(0))%360; return h; }
function tcolor(name){ const h=hue(name); return `hsl(${h} 55% 62%)`; }

let CUR = 0, TREG = [], MREG = [], HRONLY = false;
function renderTabs(){
  document.getElementById("tabs").innerHTML = DATA.houses.map((h,i)=>
    `<div class="tab ${i===CUR?'active':''}" onclick="CUR=${i};renderTabs();renderBoard()">${esc(h.title)}<span class="n">${h.stats.rooms}r · ${h.stats.tenancies}t</span><span class="hr">${h.stats.hr}⚑</span></div>`).join("") +
    `<div class="toggle ${HRONLY?'on':''}" onclick="toggleHR()"><span class="dot"></span>${HRONLY?'Showing needs-review only':'Show needs-review only'}</div>`;
}
function toggleHR(){ HRONLY=!HRONLY; document.body.classList.toggle('hronly',HRONLY); renderTabs(); }

function barHTML(t){
  const s = t.start? pd(t.start): AX_START;
  const e = t.end? pd(t.end): AX_END;
  const L = pct(s), R = pct(e), W = Math.max(1.2, R-L);
  const cls = ["bar"]; if(t.hr==="yes")cls.push("hr"); else cls.push("nohr");
  if(t.start_kind==="pre_window")cls.push("pre"); if(t.end_kind==="ongoing")cls.push("ongoing");
  const col = tcolor(t.tenant||"?");
  const nm = (t.tenant||"?").split(" ")[0];
  const idx = TREG.push(t)-1;
  return `<div class="${cls.join(' ')}" style="left:${L}%;width:${W}%;background:${col}"
     title="${esc(t.tenant)} | ${esc(t.start||'pre-window')} → ${esc(t.end||'ongoing')}"
     onclick="openTenIdx(${idx})">${esc(nm)}</div>`;
}
// pack overlapping tenancies into subrows
function pack(items){
  const rows=[];
  for(const it of items.slice().sort((a,b)=>(pd(a.start||"2025-06-24"))-(pd(b.start||"2025-06-24")))){
    const s=pd(it.start||"2025-06-24"), e=pd(it.end||"2026-07-07");
    let placed=false;
    for(const r of rows){ if(r.end<=s){ r.items.push(it); r.end=e; placed=true; break; } }
    if(!placed) rows.push({items:[it],end:e});
  }
  return rows;
}

function renderBoard(){
  TREG = []; MREG = [];
  const h = DATA.houses[CUR];
  let out = `<div class="hmeta"><span><b>${esc(h.company)}</b> · ${esc(h.portfolio)}</span>
     <span><b>${h.stats.rooms}</b> rooms</span><span><b>${h.stats.tenancies}</b> tenancies</span>
     <span><b>${h.stats.maint}</b> maintenance</span></div>`;
  out += `<div class="legend">
     <span><i style="background:var(--in)"></i>tenancy bar (colour = tenant)</span>
     <span><i style="background:var(--maint)"></i>maintenance (created→done)</span>
     <span>⚑ needs human review</span>
     <span>▏dashed = pre-window / ongoing</span></div>`;
  // axis
  out += `<div class="axis">`;
  for(const m of MONTHS){ out += `<span class="mtick" style="left:${pct(m)}%">${MN[m.getMonth()]} '${(""+m.getFullYear()).slice(2)}</span>`; }
  out += `</div>`;
  // rooms
  for(const rm of h.rooms){
    const codes = rm.codes.map(c=>c.code).join(", ");
    out += `<div class="room"><div class="rhead"><span class="rname">${esc(rm.label)}</span>
      <span class="rcodes">#${esc(codes)}</span></div>`;
    for(const n of (rm.notes||[])) out += `<div class="rnote">${esc(n)}</div>`;
    let any=false;
    for(const bed of rm.codes){
      if(!bed.tenancies.length && !bed.maint.length) continue;
      any=true;
      const rows = pack(bed.tenancies);
      out += `<div class="lane"><div class="lanelbl">#${esc(bed.code)}</div><div class="track">`;
      if(rows.length===0) out += `<div class="subrow"></div>`;
      for(const r of rows){ out += `<div class="subrow">` + r.items.map(barHTML).join("") + `</div>`; }
      out += `</div></div>`;
      if(bed.maint.length){
        out += `<div class="lane"><div class="mlbl">↳ maint (${bed.maint.length})</div><div class="track"><div class="mlane">`;
        for(const m of bed.maint) out += maintMark(m);
        out += `</div></div></div>`;
      }
    }
    if(!any) out += `<div class="empty" style="margin-left:190px">no in-window tenancy events</div>`;
    out += `</div>`;
  }
  // house-level maintenance
  if(h.house_maint && h.house_maint.length){
    out += `<details class="hm"><summary>House-level maintenance — ${h.house_maint.length} tasks (room not resolved)</summary>
      <table><thead><tr><th>Task</th><th>Created</th><th>Completed</th><th>Status</th><th>Link</th></tr></thead><tbody>`;
    for(const m of h.house_maint.sort((a,b)=>(a.created<b.created?-1:1))){
      out += `<tr><td>${esc(m.name)}</td><td>${esc(m.created||'—')}</td><td>${esc(m.completed||'—')}</td>
        <td>${esc(m.status||'')}</td><td><a href="${m.url}" target="_blank">open ↗</a></td></tr>`;
    }
    out += `</tbody></table></details>`;
  }
  document.getElementById("board").innerHTML = out;
}

function maintMark(m){
  const c = m.created? pd(m.created): null;
  if(!c) return "";
  const L = pct(c);
  const e = m.completed? pd(m.completed): null;
  const idx = MREG.push(m)-1;
  if(e && e>c){ const W=Math.max(0.6,pct(e)-L);
    return `<div class="mseg" style="left:${L}%;width:${W}%" title="${esc(m.name)}" onclick="openMaintIdx(${idx})"></div>`; }
  return `<div class="mdot" style="left:${L}%" title="${esc(m.name)}" onclick="openMaintIdx(${idx})"></div>`;
}

function taskCard(d,kind){
  if(!d) return `<div class="card"><h4>${kind==='in'?'Move-in':'Move-out'} <span class="pill ${kind==='in'?'pin':'pout'}">${kind==='in'?'IN':'OUT'}</span></h4><div class="empty">No ${kind==='in'?'move-in':'move-out'} task (${kind==='in'?'pre-window occupant':'still ongoing'}).</div></div>`;
  let kv = `<div class="kv">
    <b>Date</b><span>${esc(d.date||'—')} ${d.date_source?`<span style="color:var(--mut2)">(${esc(d.date_source)})</span>`:''}</span>
    <b>Task</b><span>${esc(d.name)}</span>`;
  if(d.section) kv += `<b>Section</b><span>${esc(d.section)}</span>`;
  if(d.rent) kv += `<b>Weekly rent</b><span>${esc(d.rent)}</span>`;
  if(kind==='in' && d.paid) kv += `<b>Paid</b><span>${esc(d.paid).slice(0,10)}</span>`;
  if(d.transfer) kv += `<b>Transfer</b><span>${esc(d.transfer)}</span>`;
  if(d.sale_status) kv += `<b>Sale status</b><span>${esc(d.sale_status)}</span>`;
  kv += `</div>`;
  let extra = "";
  if(d.review) extra += `<div class="note"><b style="color:var(--mut)">Review:</b> ${esc(d.review)}</div>`;
  if(d.hr==='yes') extra += `<div class="flag">⚑ Flagged for human review</div>`;
  if(d.fees){ const f=d.fees;
    extra += `<div class="fee"><b>Fees:</b> ${esc(f.applied||'—')}${f.breakdown?` — ${esc(f.breakdown)}`:''}${f.waived&&f.waived!=='none'?`<br><b>Waived:</b> ${esc(f.waived)}`:''}${f.bond?`<br><b>Bond:</b> ${esc(f.bond)}`:''}${f.needs_check==='yes'?`<br><span style="color:#e0a">needs Asana comment check</span>`:''}</div>`;
  }
  if(d.notes) extra += `<div class="note"><b style="color:var(--mut)">Task notes:</b>\n${esc(d.notes)}</div>`;
  extra += `<div style="margin-top:9px"><a class="lnk" href="${d.url}" target="_blank">Open task in Asana ↗</a></div>`;
  const pill = kind==='in'?'<span class="pill pin">IN</span>':'<span class="pill pout">OUT</span>';
  return `<div class="card"><h4>${kind==='in'?'Move-in':'Move-out'} ${pill}</h4>${kv}${extra}</div>`;
}

function openTenIdx(i){ openTen(TREG[i]); }
function openMaintIdx(i){ openMaint(MREG[i]); }
function kurianBox(r){
  if(!r) return "";
  const facts = (r.facts||[]).map(f=>`<li>${esc(f)}</li>`).join("");
  const ruling = (r.ruling&&r.ruling.length)
    ? `<div class="kruling"><div class="klab">✓ Kurian's ruling on record</div>${r.ruling.map(x=>`<p>${esc(x)}</p>`).join("")}</div>`
    : `<div class="krow" style="color:var(--mut2);font-size:11.5px;margin-top:8px">No ruling recorded yet — awaiting your call.</div>`;
  return `<div class="kbox">
    <div class="khead"><span class="ktag">KURIAN · NEEDS REVIEW</span><span class="kcat">${esc(r.head)}</span></div>
    <div class="keli"><b>In plain terms —</b> ${esc(r.eli25)}</div>
    <div class="kfacts"><b>Facts that matter</b><ul>${facts}</ul></div>
    ${ruling}
  </div>`;
}
function openTen(t){
  const flag = t.hr==="yes" ? ' <span style="color:#f0a64e">⚑</span>' : '';
  document.getElementById("dtitle").innerHTML = `${esc(t.tenant||'?')}${flag} <span style="color:var(--mut);font-size:12px">· ${esc(t.start||'pre-window')} → ${esc(t.end||'ongoing')}</span>`;
  document.getElementById("dbody").innerHTML = kurianBox(t.review) + taskCard(t.movein,'in') + taskCard(t.moveout,'out');
  document.getElementById("drawer").classList.add("open");
}
function openMaint(m){
  document.getElementById("dtitle").innerHTML = `🛠 Maintenance`;
  document.getElementById("dbody").innerHTML = `<div class="card"><h4>Maintenance request</h4>
    <div class="kv"><b>Task</b><span>${esc(m.name)}</span>
    <b>Created</b><span>${esc(m.created||'—')}</span><b>Completed</b><span>${esc(m.completed||'—')}</span>
    <b>Status</b><span>${esc(m.status||'—')}</span></div>
    ${m.notes?`<div class="note">${esc(m.notes)}</div>`:''}
    <div style="margin-top:9px"><a class="lnk" href="${m.url}" target="_blank">Open task in Asana ↗</a></div></div>`;
  document.getElementById("drawer").classList.add("open");
}
function closeDrawer(){ document.getElementById("drawer").classList.remove("open"); }
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeDrawer(); });

renderTabs(); renderBoard();
</script>
</body>
</html>
